name: sellova_mobile
description: Sellova mobile API/data layer scaffold.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  file_picker: ^8.1.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_riverpod: ^2.5.1
  image_picker: ^1.1.2
  go_router: ^14.2.7
  google_sign_in: ^6.2.2
  pusher_client: ^2.0.0
  shared_preferences: ^2.3.2
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_lints: ^4.0.0
  lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
