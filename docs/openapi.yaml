openapi: 3.1.0
info:
  title: Sellova API
  version: 1.0.0
  description: Contract-stable live API only.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - { name: Auth }
  - { name: Profile }
  - { name: Products }
  - { name: Orders }
  - { name: Disputes }
  - { name: Withdrawals }
paths:
  /api/v1/auth/register:
    post: { tags: [Auth], security: [], operationId: authRegister, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AuthRegisterRequest' } } } }, responses: { '201': { $ref: '#/components/responses/AuthSessionSuccess' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/auth/login:
    post: { tags: [Auth], security: [], operationId: authLogin, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AuthLoginRequest' } } } }, responses: { '200': { $ref: '#/components/responses/AuthSessionSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/auth/refresh:
    post: { tags: [Auth], security: [], operationId: authRefresh, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AuthRefreshRequest' } } } }, responses: { '200': { $ref: '#/components/responses/AuthSessionSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/auth/logout:
    post: { tags: [Auth], operationId: authLogout, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/me:
    get: { tags: [Profile], operationId: meShow, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '500': { $ref: '#/components/responses/InternalError' } } }
    patch: { tags: [Profile], operationId: meUpdate, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MeUpdateRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/me/seller:
    get: { tags: [Profile], operationId: meSellerShow, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '500': { $ref: '#/components/responses/InternalError' } } }
    patch: { tags: [Profile], operationId: meSellerUpdate, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MeSellerUpdateRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/products:
    get: { tags: [Products], security: [], operationId: productsList, parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ], responses: { '200': { $ref: '#/components/responses/PaginatedSuccess' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/products/search:
    get: { tags: [Products], security: [], operationId: productsSearch, parameters: [ { name: search, in: query, required: true, schema: { type: string, minLength: 1 } }, { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ], responses: { '200': { $ref: '#/components/responses/PaginatedSuccess' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/products/{productId}:
    get: { tags: [Products], security: [], operationId: productsShow, parameters: [ { name: productId, in: path, required: true, schema: { type: integer } } ], responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '404': { $ref: '#/components/responses/NotFoundError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/orders:
    get: { tags: [Orders], operationId: ordersList, parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ], responses: { '200': { $ref: '#/components/responses/PaginatedSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/orders/{orderId}:
    get: { tags: [Orders], operationId: ordersShow, parameters: [ { name: orderId, in: path, required: true, schema: { type: integer } } ], responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/orders/{orderId}/mark-pending-payment:
    post: { tags: [Orders], operationId: ordersMarkPendingPayment, parameters: [ { name: orderId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: false, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/InvalidStateTransitionError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/orders/{orderId}/mark-paid:
    post: { tags: [Orders], operationId: ordersMarkPaid, parameters: [ { name: orderId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OrderMarkPaidRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/InvalidStateTransitionError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes:
    get: { tags: [Disputes], operationId: disputesList, parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ], responses: { '200': { $ref: '#/components/responses/PaginatedSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/orders/{orderId}/disputes:
    post: { tags: [Disputes], operationId: disputesOpen, parameters: [ { name: orderId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeOpenRequest' } } } }, responses: { '201': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}:
    get: { tags: [Disputes], operationId: disputesShow, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}/evidence:
    post: { tags: [Disputes], operationId: disputesEvidence, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeEvidenceRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/InvalidStateTransitionError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}/move-to-review:
    post: { tags: [Disputes], operationId: disputesMoveToReview, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/InvalidStateTransitionError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}/escalate:
    post: { tags: [Disputes], operationId: disputesEscalate, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/InvalidStateTransitionError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}/resolve/refund:
    post: { tags: [Disputes], operationId: disputesResolveRefund, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeResolveRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}/resolve/release:
    post: { tags: [Disputes], operationId: disputesResolveRelease, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeResolveRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/disputes/{disputeCaseId}/resolve/split:
    post: { tags: [Disputes], operationId: disputesResolveSplit, parameters: [ { name: disputeCaseId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/DisputeResolveRequest' }, { type: object, required: [buyer_refund_amount], properties: { buyer_refund_amount: { type: string } } } ] } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/withdrawals:
    get: { tags: [Withdrawals], operationId: withdrawalsList, parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PerPage' } ], responses: { '200': { $ref: '#/components/responses/PaginatedSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '500': { $ref: '#/components/responses/InternalError' } } }
    post: { tags: [Withdrawals], operationId: withdrawalsRequest, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/WithdrawalRequest' } } } }, responses: { '201': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/withdrawals/{withdrawalRequestId}:
    get: { tags: [Withdrawals], operationId: withdrawalsShow, parameters: [ { name: withdrawalRequestId, in: path, required: true, schema: { type: integer } } ], responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/withdrawals/{withdrawalRequestId}/review:
    post: { tags: [Withdrawals], operationId: withdrawalsReview, parameters: [ { name: withdrawalRequestId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/WithdrawalReviewRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/withdrawals/{withdrawalRequestId}/approve:
    post: { tags: [Withdrawals], operationId: withdrawalsApprove, parameters: [ { name: withdrawalRequestId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/IdempotencyRequest' } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/withdrawals/{withdrawalRequestId}/reject:
    post: { tags: [Withdrawals], operationId: withdrawalsReject, parameters: [ { name: withdrawalRequestId, in: path, required: true, schema: { type: integer } } ], requestBody: { required: true, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/IdempotencyRequest' }, { type: object, properties: { reason: { type: string } }, required: [reason] } ] } } } }, responses: { '200': { $ref: '#/components/responses/GenericSuccess' }, '401': { $ref: '#/components/responses/UnauthenticatedError' }, '403': { $ref: '#/components/responses/ForbiddenError' }, '404': { $ref: '#/components/responses/NotFoundError' }, '409': { $ref: '#/components/responses/ConflictError' }, '422': { $ref: '#/components/responses/ValidationError' }, '500': { $ref: '#/components/responses/InternalError' } } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: Bearer }
  parameters:
    Page: { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
    PerPage: { name: per_page, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 10 } }
  responses:
    GenericSuccess: { description: Success envelope, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessEnvelope' } } } }
    PaginatedSuccess: { description: Paginated success envelope, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedSuccessEnvelope' } } } }
    AuthSessionSuccess: { description: Auth session success, content: { application/json: { schema: { allOf: [ { $ref: '#/components/schemas/SuccessEnvelope' }, { type: object, properties: { data: { $ref: '#/components/schemas/AuthSession' } } } ] } } } }
    ValidationError: { description: Validation/domain validation error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    UnauthenticatedError: { description: Authentication error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    ForbiddenError: { description: Authorization error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    NotFoundError: { description: Not found error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    ConflictError: { description: Conflict/idempotency error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    InvalidStateTransitionError: { description: Invalid state transition error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
    InternalError: { description: Generic internal error, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
  schemas:
    SuccessEnvelope: { type: object, required: [data], properties: { data: {}, meta: { $ref: '#/components/schemas/PaginationMeta' } }, additionalProperties: false }
    PaginatedSuccessEnvelope: { type: object, required: [data, meta], properties: { data: { type: array, items: {} }, meta: { $ref: '#/components/schemas/PaginationMeta' } }, additionalProperties: false }
    ErrorEnvelope: { type: object, required: [error, message], properties: { error: { type: string }, message: { type: string } }, additionalProperties: true }
    PaginationMeta: { type: object, required: [page, per_page, total, last_page], properties: { page: { type: integer }, per_page: { type: integer }, total: { type: integer }, last_page: { type: integer } }, additionalProperties: true }
    AuthSession: { type: object, required: [access_token, refresh_token, token_type, expires_in, user_id], properties: { access_token: { type: string }, refresh_token: { type: string }, token_type: { type: string }, expires_in: { type: integer }, user_id: { type: integer } }, additionalProperties: true }
    AuthRegisterRequest: { type: object, required: [account_type, email, password, display_name, country_code, default_currency], properties: { account_type: { type: string, enum: [buyer, seller] }, email: { type: string, format: email }, phone: { type: string }, password: { type: string }, display_name: { type: string }, legal_name: { type: string }, country_code: { type: string }, default_currency: { type: string } }, additionalProperties: false }
    AuthLoginRequest: { type: object, required: [password], properties: { email: { type: string, format: email }, phone: { type: string }, password: { type: string } }, additionalProperties: false }
    AuthRefreshRequest: { type: object, required: [refresh_token], properties: { refresh_token: { type: string } }, additionalProperties: false }
    MeUpdateRequest: { type: object, properties: { phone: { type: string } }, additionalProperties: false }
    MeSellerUpdateRequest: { type: object, properties: { display_name: { type: string }, legal_name: { type: string } }, additionalProperties: false }
    OrderMarkPaidRequest: { type: object, required: [payment_transaction_id], properties: { payment_transaction_id: { type: integer }, correlation_id: { type: string } }, additionalProperties: false }
    DisputeOpenRequest: { type: object, required: [reason_code], properties: { order_item_id: { type: integer }, reason_code: { type: string }, idempotency_key: { type: string } }, additionalProperties: false }
    DisputeEvidenceRequest: { type: object, required: [evidence], properties: { evidence: { type: array, items: { type: object, additionalProperties: true } } }, additionalProperties: false }
    DisputeResolveRequest: { type: object, required: [currency, reason_code, notes, idempotency_key], properties: { currency: { type: string }, reason_code: { type: string }, notes: { type: string }, idempotency_key: { type: string } }, additionalProperties: false }
    WithdrawalRequest: { type: object, required: [seller_profile_id, wallet_id, amount, currency, idempotency_key], properties: { seller_profile_id: { type: integer }, wallet_id: { type: integer }, amount: { type: string }, currency: { type: string }, idempotency_key: { type: string } }, additionalProperties: false }
    IdempotencyRequest: { type: object, required: [idempotency_key], properties: { idempotency_key: { type: string } }, additionalProperties: false }
    WithdrawalReviewRequest: { type: object, required: [decision, idempotency_key], properties: { decision: { type: string, enum: [approved, rejected] }, idempotency_key: { type: string }, reason: { type: string } }, additionalProperties: false }
x-excludedEndpoints:
  - { method: POST, path: /api/v1/orders, reason: order create out-of-scope }
  - { method: POST, path: /api/v1/orders/{orderId}/advance-fulfillment, reason: order fulfillment out-of-scope }
  - { method: POST, path: /api/v1/orders/{orderId}/complete, reason: order fulfillment out-of-scope }
  - { method: POST, path: /api/v1/products, reason: product write out-of-scope }
  - { method: PATCH, path: /api/v1/products/{productId}, reason: product write out-of-scope }
  - { method: DELETE, path: /api/v1/products/{productId}, reason: product write out-of-scope }
  - { method: POST, path: /api/v1/withdrawals/{withdrawalRequestId}/payout/submit, reason: payout pipeline out-of-scope }
  - { method: POST, path: /api/v1/withdrawals/{withdrawalRequestId}/payout/confirm, reason: payout pipeline out-of-scope }
  - { method: POST, path: /api/v1/withdrawals/{withdrawalRequestId}/payout/fail, reason: payout pipeline out-of-scope }
